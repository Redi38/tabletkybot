services:
  db:
    image: postgres:16-alpine
    container_name: medbot_db
    restart: always
    environment:
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpassword
      POSTGRES_DB: medbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d medbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medbot_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: medbot_core
    restart: always
    command: python main.py
    env_file:
      - .env
    environment:
      LOG_DIR: /app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8443:8443"
    volumes:
      - logs_data:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  admin:
    build: .
    container_name: medbot_admin
    restart: always
    command: uvicorn admin.app:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      LOG_DIR: /app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      bot:
        condition: service_healthy
    volumes:
      - logs_data:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  logs_data:
