repos:
  # Mirrors the "lint" CI job: ruff check + ruff format --check
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Mirrors the "typecheck" CI job: mypy . --ignore-missing-imports
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.3.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        additional_dependencies: []
